<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Puzzles | Shreyansh Narayan</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/theme.css" />
  <style>
    .puzzle-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 1.5rem;
      padding: 2rem;
    }
    blockquote {
      border-left: 3px solid rgba(255,255,255,0.25);
      padding: 1rem 1.5rem;
      margin: 0 auto;
      max-width: 560px;
      text-align: left;
      font-style: italic;
      opacity: 0.85;
      line-height: 1.9;
    }
    .puzzle-input {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .puzzle-input input {
      padding: 0.65rem 1.2rem;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.06);
      color: inherit;
      font-size: 1rem;
      outline: none;
      width: 240px;
    }
    .puzzle-input button {
      padding: 0.65rem 1.5rem;
      border-radius: 10px;
      border: 1px solid currentColor;
      background: none;
      color: inherit;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .puzzle-input button:hover { background: rgba(255,255,255,0.1); }
    #result {
      min-height: 1.4rem;
      font-size: 1rem;
      font-weight: 500;
    }
    .skip-link {
      opacity: 0.4;
      font-size: 0.85rem;
      text-decoration: none;
      color: inherit;
      margin-top: 0.5rem;
    }
    .skip-link:hover { opacity: 0.8; }
  </style>
</head>
<body class="dark">

  <button class="theme-toggle" id="theme-toggle">☾ / ☀</button>

  <main class="puzzle-wrap">
    <h1>🧩 Puzzle Gate</h1>
    <p style="opacity:0.55;">Solve to enter. Or don't &mdash; it's optional.</p>
    <div class="liquid-bar" style="width:200px;"></div>

    <blockquote>
      I protect systems without being seen.<br />
      I fail silently when ignored.<br />
      I reward those who verify.<br /><br />
      <strong>What am I?</strong>
    </blockquote>

    <div class="puzzle-input">
      <input type="text" id="answer" placeholder="Your answer…" />
      <button onclick="checkAnswer()">Submit</button>
    </div>

    <p id="result"></p>
    <a href="home.html" class="skip-link">Skip → Go straight to site</a>
  </main>

  <script src="js/gate.js"></script>
  <script src="js/theme.js"></script>
</body>
</html>
