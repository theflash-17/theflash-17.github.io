<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enter | Shreyansh Narayan</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/theme.css" />
  <style>
    .gate {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 1.5rem;
    }
    .gate h1 { font-size: 2.8rem; margin: 0; }
    .gate p { opacity: 0.6; margin: 0; }
    .gate-buttons {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 1rem;
    }
    .gate-buttons a {
      padding: 0.7rem 2rem;
      border: 1px solid currentColor;
      border-radius: 12px;
      text-decoration: none;
      color: inherit;
      font-size: 1rem;
      transition: background 0.2s ease;
    }
    .gate-buttons a:hover { background: rgba(255,255,255,0.12); }
  </style>
</head>
<body class="dark">

  <button class="theme-toggle" id="theme-toggle">☾ / ☀</button>

  <main class="gate">
    <h1>Enter My Website</h1>
    <p>Select your path</p>
    <div class="gate-buttons">
      <a href="home.html">→ Continue</a>
      <a href="puzzles.html">🧩 Solve a Puzzle</a>
    </div>
  </main>

  <script src="js/theme.js"></script>
</body>
</html>
